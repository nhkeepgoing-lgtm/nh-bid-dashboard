name: NH농협 입찰공고 자동 크롤링

on:
  schedule:
    - cron: '0 0 * * 1-5'
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  crawl:
    name: 입찰공고 크롤링
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Python 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: Playwright Chromium 설치
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 크롤링 실행
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python crawler/crawl.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/bids.json
          git diff --staged --quiet || git commit -m "chore: 입찰공고 갱신 $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 크롤링 결과 요약 출력
        if: always()
        run: |
          if [ -f data/bids.json ]; then
            python3 -c "
          import json
          with open('data/bids.json') as f:
              d = json.load(f)
          print(f'총 {d[\"total\"]}건 수집')
          for src_id, meta in d.get('sources', {}).items():
              print(f'  {meta[\"name\"]}: {meta[\"count\"]}건 ({meta[\"status\"]})')
            "
          fi

  deploy:
    name: GitHub Pages 배포
    needs: crawl
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: data 폴더 복사
        run: |
          mkdir -p dashboard/public/data
          cp data/bids.json dashboard/public/data/bids.json

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/public/

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
